<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #00ff88; --bg: #050505; --card: #111; --text: #eee; }
        body { background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; margin: 0; overflow: hidden; user-select: none; }
        .app-container { height: 100vh; display: flex; flex-direction: column; }
        .content-section { flex: 1; overflow-y: auto; padding: 20px; display: none; }
        .content-section.active { display: block; }

        /* الرصيد */
        .balance-card { background: linear-gradient(180deg, #111, #050505); padding: 20px; border-radius: 20px; margin-bottom: 20px; border-bottom: 2px solid var(--primary); }
        .bal-title { font-size: 12px; color: #888; letter-spacing: 2px; }
        .bal-value { font-size: 45px; font-weight: 900; color: var(--primary); }

        /* التعدين */
        .mine-circle { width: 220px; height: 220px; background: radial-gradient(circle, #1a1a1a 0%, #050505 100%); border-radius: 50%; margin: 40px auto; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 5px solid #222; position: relative; box-shadow: 0 0 50px rgba(0,0,0,0.5); cursor: pointer; transition: 0.3s; }
        .mine-circle.active { border-color: var(--primary); box-shadow: 0 0 30px rgba(0,255,136,0.2); }
        .mine-icon { font-size: 60px; color: #333; }
        .active .mine-icon { color: var(--primary); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* المهام */
        .task-box { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 12px; display: flex; align-items: center; border: 1px solid #222; }
        .task-icon { width: 45px; height: 45px; background: #1a1a1a; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .task-info { flex: 1; margin: 0 15px; text-align: right; }
        .task-t { display: block; font-weight: bold; font-size: 14px; }
        .task-r { font-size: 12px; color: var(--primary); }
        .claim-btn { background: var(--primary); border: none; padding: 8px 15px; border-radius: 10px; font-weight: bold; font-size: 12px; cursor: pointer; }
        .claim-btn:disabled { background: #222; color: #555; }

        /* المحفظة */
        .wallet-addr { background: #111; padding: 15px; border-radius: 10px; font-family: monospace; font-size: 12px; color: #888; border: 1px dashed #333; margin-top: 10px; }

        /* التنقل */
        .nav-bar { background: #0a0a0a; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #1a1a1a; }
        .nav-item { color: #444; text-align: center; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--primary); transform: translateY(-5px); }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 5px; }
        .nav-item span { font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <section id="mine-sec" class="content-section active">
        <div class="balance-card">
            <div class="bal-title">TOTAL BALANCE</div>
            <div class="bal-value" id="main-bal">0.00</div>
        </div>
        <div class="mine-circle" id="m-btn" onclick="startMining()">
            <i class="fas fa-hammer mine-icon"></i>
            <div id="m-status" style="margin-top:15px; font-size: 12px; color: #555;">START MINING</div>
            <div id="timer" style="color: var(--primary); font-weight: bold; margin-top: 5px;"></div>
        </div>
        <div style="color: #444; font-size: 12px;">معدل التعدين: 0.05 PLT / ساعة</div>
    </section>

    <section id="tasks-sec" class="content-section">
        <h3 style="text-align: right;">المهام المتاحة</h3>
        <div class="task-box">
            <div class="task-icon"><i class="fab fa-telegram" style="color: #24A1DE;"></i></div>
            <div class="task-info"><span class="task-t">انضم لقناة البوت</span><span class="task-r">+2.00 PLT</span></div>
            <button class="claim-btn" onclick="doTask(this, 2.0, 'https://t.me/PalestinePLT')">إتمام</button>
        </div>
        <div class="task-box">
            <div class="task-icon"><i class="fas fa-play-circle" style="color: #ff0000;"></i></div>
            <div class="task-info"><span class="task-t">مشاهدة إعلان مكافأة</span><span class="task-r">+0.50 PLT</span></div>
            <button class="claim-btn" onclick="doAd(this)">مشاهدة</button>
        </div>
        <div class="task-box">
            <div class="task-icon"><i class="fas fa-users" style="color: var(--primary);"></i></div>
            <div class="task-info"><span class="task-t">دعوة صديق جديد</span><span class="task-r">+5.00 PLT</span></div>
            <button class="claim-btn" onclick="invite()">دعوة</button>
        </div>
    </section>

    <section id="wallet-sec" class="content-section">
        <h3 style="text-align: right;">محفظتك الرقمية</h3>
        <div class="balance-card">
            <div class="bal-title">AVAILABLE TO WITHDRAW</div>
            <div class="bal-value" id="wallet-bal">0.00</div>
        </div>
        <div style="text-align: right; font-size: 14px; margin-bottom: 5px;">عنوان المحفظة (PLT Network)</div>
        <div class="wallet-addr">PLT_ox71...99Az2b</div>
        <button class="claim-btn" style="width: 100%; margin-top: 20px; height: 50px;" onclick="tg.showAlert('الحد الأدنى للسحب هو 1000 عملة')">سحب العملات</button>
    </section>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="showSec('mine-sec', this)"><i class="fas fa-hammer"></i><span>تعدين</span></div>
        <div class="nav-item" onclick="showSec('tasks-sec', this)"><i class="fas fa-tasks"></i><span>مهام</span></div>
        <div class="nav-item" onclick="showSec('wallet-sec', this)"><i class="fas fa-wallet"></i><span>محفظة</span></div>
    </nav>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();

    let bal = parseFloat(localStorage.getItem('p_bal')) || 0;
    let mEnd = localStorage.getItem('m_end');

    function updateBalDisplay() {
        document.getElementById('main-bal').innerText = bal.toFixed(2);
        document.getElementById('wallet-bal').innerText = bal.toFixed(2);
        localStorage.setItem('p_bal', bal);
    }
    updateBalDisplay();

    function showSec(id, el) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    function startMining() {
        if (mEnd && Date.now() < mEnd) return;
        mEnd = Date.now() + (24 * 60 * 60 * 1000);
        localStorage.setItem('m_end', mEnd);
        runMining();
    }

    function runMining() {
        const btn = document.getElementById('m-btn');
        const timerEl = document.getElementById('timer');
        if (!mEnd || Date.now() >= mEnd) return;

        btn.classList.add('active');
        document.getElementById('m-status').innerText = "FARMING...";
        
        const interval = setInterval(() => {
            const left = mEnd - Date.now();
            if (left <= 0) {
                clearInterval(interval);
                btn.classList.remove('active');
                document.getElementById('m-status').innerText = "CLAIM READY";
                timerEl.innerText = "";
            } else {
                const h = Math.floor(left/3600000);
                const m = Math.floor((left%3600000)/60000);
                const s = Math.floor((left%60000)/1000);
                timerEl.innerText = `${h}:${m<10?'0'+m:m}:${s<10?'0'+s:s}`;
                bal += 0.00001; // زيادة تلقائية أثناء التعدين
                updateBalDisplay();
            }
        }, 1000);
    }

    function doTask(btn, reward, url) {
        tg.openLink(url);
        setTimeout(() => {
            bal += reward;
            updateBalDisplay();
            btn.disabled = true;
            btn.innerText = "تم ✅";
            tg.showAlert(`مبروك! حصلت على ${reward} عملة`);
        }, 3000);
    }

    function doAd(btn) {
        const adLink = "https://www.highrateads.com/display/direct/?id=28088";
        tg.openLink(adLink);
        setTimeout(() => {
            bal += 0.5;
            updateBalDisplay();
            tg.showAlert("تمت إضافة مكافأة الإعلان!");
        }, 5000);
    }

    function invite() {
        const url = `https://t.me/share/url?url=https://t.me/PalestinePLT_bot&text=ابدأ التعدين واربح عملة PLT مجاناً!`;
        tg.openTelegramLink(url);
    }

    if (mEnd) runMining();
</script>
</body>
</html>

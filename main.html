<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main: #f3ba2f; --bg: #000; --card: #1c1f24; }
        body { background: var(--bg); color: white; font-family: 'Cairo', sans-serif; margin: 0; padding: 0; overflow: hidden; user-select: none; }
        .app { height: 100vh; display: flex; flex-direction: column; }
        .page { flex: 1; overflow-y: auto; padding: 20px; display: none; padding-bottom: 90px; }
        .active { display: flex !important; flex-direction: column; }

        /* الرصيد العلوي */
        .balance-section { text-align: center; padding: 20px; background: linear-gradient(180deg, #111, #000); border-bottom: 2px solid var(--main); }
        .bal-amount { font-size: 45px; font-weight: 900; color: white; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .bal-amount img { width: 40px; }

        /* منطقة التعدين */
        .mine-area { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .main-btn { width: 220px; height: 220px; background: radial-gradient(circle, #2b2f36, #000); border-radius: 50%; border: 8px solid #222; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; position: relative; box-shadow: 0 0 40px rgba(0,0,0,0.5); }
        .main-btn.active-mining { border-color: var(--main); box-shadow: 0 0 20px rgba(243, 186, 47, 0.2); }
        .main-btn img { width: 140px; }

        /* المهام والإحالات */
        .task-card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; border: 1px solid #2d333b; }
        .task-info { display: flex; align-items: center; gap: 12px; text-align: right; }
        .task-icon { width: 40px; height: 40px; background: #2b2f36; border-radius: 10px; display: flex; justify-content: center; align-items: center; color: var(--main); font-size: 20px; }
        .claim-btn { background: var(--main); color: black; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .claim-btn:disabled { background: #333; color: #777; }

        /* الناف بار */
        .navbar { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; padding: 12px 0; border-top: 1px solid #222; }
        .nav-item { flex: 1; text-align: center; color: #888; font-size: 11px; cursor: pointer; }
        .nav-item.active-nav { color: var(--main); }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

<div class="app">
    <div id="p-mine" class="page active">
        <div class="balance-section">
            <div class="bal-amount"><img src="https://cryptologos.cc/logos/hamster-kombat-hmstr-logo.png"> <span id="total-bal">0</span></div>
            <div style="color: #666; font-size: 12px; margin-top: 5px;">إجمالي عملات PALESTINE</div>
        </div>
        <div class="mine-area">
            <div class="main-btn" id="m-btn" onclick="startMining()">
                <img src="https://cryptologos.cc/logos/hamster-kombat-hmstr-logo.png">
                <div id="m-timer" style="color: var(--main); font-weight: 900; font-size: 20px; margin-top: 10px;">ابدأ التعدين</div>
            </div>
            <p id="m-status" style="color: #555; font-size: 12px; margin-top: 15px;">دورة التعدين: 24 ساعة</p>
        </div>
    </div>

    <div id="p-tasks" class="page">
        <h3 style="text-align: right;">المهام اليومية (أرباح ضخمة)</h3>
        <div class="task-card">
            <div class="task-info"><div class="task-icon"><i class="fas fa-ad"></i></div><div><b>مشاهدة إعلان</b><br><small style="color:var(--main)">+10,000</small></div></div>
            <button class="claim-btn" onclick="showAds()">مشاهدة</button>
        </div>
        <div class="task-card">
            <div class="task-info"><div class="task-icon"><i class="fab fa-telegram"></i></div><div><b>انضم للقناة</b><br><small style="color:var(--main)">+25,000</small></div></div>
            <button class="claim-btn" onclick="doTask(this, 25000, 'https://t.me/PalestinePLT')">انضمام</button>
        </div>
        <div class="task-card">
            <div class="task-info"><div class="task-icon"><i class="fab fa-youtube"></i></div><div><b>اشترك باليوتيوب</b><br><small style="color:var(--main)">+50,000</small></div></div>
            <button class="claim-btn" onclick="doTask(this, 50000, 'https://youtube.com')">اشتراك</button>
        </div>
    </div>

    <div id="p-ref" class="page">
        <h3 style="text-align: right;">نظام الإحالات</h3>
        <div class="task-card" style="flex-direction: column; gap: 15px; text-align: center;">
            <p>اربح 50,000 عملة عن كل صديق تدعوه!</p>
            <button class="claim-btn" style="width: 100%;" onclick="invite()">دعوة الأصدقاء</button>
        </div>
    </div>

    <nav class="navbar">
        <div class="nav-item active-nav" onclick="go('p-mine', this)"><i class="fas fa-hammer"></i><span>تعدين</span></div>
        <div class="nav-item" onclick="go('p-tasks', this)"><i class="fas fa-tasks"></i><span>المهام</span></div>
        <div class="nav-item" onclick="go('p-ref', this)"><i class="fas fa-users"></i><span>الأصدقاء</span></div>
    </nav>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();

    const AdController = window.Adsgram ? window.Adsgram.init({ blockId: "bot-28088" }) : null;

    let balance = parseInt(localStorage.getItem('plt_bal')) || 0;
    let endTime = localStorage.getItem('plt_end');

    function refresh() {
        document.getElementById('total-bal').innerText = balance.toLocaleString();
        localStorage.setItem('plt_bal', balance);
    }
    refresh();

    function go(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active-nav');
    }

    async function showAds() {
        if (!AdController) return;
        try {
            await AdController.show();
            balance += 10000; refresh();
            tg.showAlert("تمت إضافة 10,000 عملة!");
        } catch(e) { tg.showAlert("لا يوجد إعلانات حالياً"); }
    }

    function doTask(btn, amt, url) {
        tg.openLink(url);
        setTimeout(() => {
            balance += amt; refresh();
            btn.disabled = true; btn.innerText = "تم ✅";
        }, 5000);
    }

    function startMining() {
        if (endTime && Date.now() < endTime) return;
        endTime = Date.now() + (24 * 60 * 60 * 1000);
        localStorage.setItem('plt_end', endTime);
        updateMining();
    }

    function updateMining() {
        const btn = document.getElementById('m-btn');
        const timer = document.getElementById('m-timer');
        if (!endTime || Date.now() >= endTime) return;

        btn.classList.add('active-mining');
        const itv = setInterval(() => {
            const diff = endTime - Date.now();
            if (diff <= 0) {
                clearInterval(itv);
                btn.classList.remove('active-mining');
                timer.innerText = "ابدأ التعدين";
            } else {
                const h = Math.floor(diff/3600000);
                const m = Math.floor((diff%3600000)/60000);
                const s = Math.floor((diff%60000)/1000);
                timer.innerText = `${h}:${m<10?'0'+m:m}:${s<10?'0'+s:s}`;
                balance += 10; refresh(); // ربح تلقائي أثناء التعدين
            }
        }, 1000);
    }

    function invite() {
        const text = "ابدأ التعدين معي في بوت فلسطين واربح آلاف العملات!";
        tg.openTelegramLink(`https://t.me/share/url?url=https://t.me/PalestinePLT_bot&text=${text}`);
    }

    if (endTime) updateMining();
</script>
</body>
</html>

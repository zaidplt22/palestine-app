<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #00ff88; --bg: #050505; --card: #111; --text: #eee; }
        body { background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; margin: 0; padding: 0; overflow: hidden; user-select: none; }
        .app-container { height: 100vh; display: flex; flex-direction: column; }
        .content-section { flex: 1; overflow-y: auto; padding: 20px; display: none; }
        .content-section.active { display: block; }
        .balance-card { background: linear-gradient(180deg, #111, #050505); padding: 25px; border-radius: 20px; margin-bottom: 20px; border-bottom: 2px solid var(--primary); text-align: center; }
        .bal-value { font-size: 50px; font-weight: 900; color: var(--primary); }
        .mine-circle { width: 200px; height: 200px; background: radial-gradient(circle, #1a1a1a 0%, #050505 100%); border-radius: 50%; margin: 30px auto; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 5px solid #222; cursor: pointer; transition: 0.3s; }
        .mine-circle.active { border-color: var(--primary); box-shadow: 0 0 30px rgba(0,255,136,0.2); }
        .mine-icon { font-size: 60px; color: #333; }
        .active .mine-icon { color: var(--primary); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .task-box { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 12px; display: flex; align-items: center; border: 1px solid #222; }
        .task-info { flex: 1; margin: 0 15px; text-align: right; }
        .claim-btn { background: var(--primary); border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .nav-bar { background: #0a0a0a; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #1a1a1a; }
        .nav-item { color: #444; text-align: center; cursor: pointer; transition: 0.3s; flex: 1; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="app-container">
    <section id="mine-sec" class="content-section active">
        <div class="balance-card">
            <div style="font-size: 12px; color: #888;">رصيد PLT الحالي</div>
            <div class="bal-value" id="main-bal">0.00</div>
        </div>
        <div class="mine-circle" id="m-btn" onclick="startMining()">
            <i class="fas fa-hammer mine-icon"></i>
            <div id="m-status" style="margin-top:10px; font-size: 12px;">ابدأ التعدين</div>
            <div id="timer" style="color: var(--primary); font-weight: bold; margin-top: 5px;"></div>
        </div>
    </section>

    <section id="tasks-sec" class="content-section">
        <h3 style="text-align: right;">المهام اليومية</h3>
        <div class="task-box">
            <i class="fas fa-ad" style="font-size: 24px; color: var(--primary);"></i>
            <div class="task-info"><span>مشاهدة إعلان Adsgram</span><br><small style="color:var(--primary)">+0.50 PLT</small></div>
            <button class="claim-btn" onclick="showAdsgram()">مشاهدة</button>
        </div>
        <div class="task-box">
            <i class="fab fa-telegram" style="font-size: 24px; color: #24A1DE;"></i>
            <div class="task-info"><span>انضم لقناتنا</span><br><small style="color:var(--primary)">+2.00 PLT</small></div>
            <button class="claim-btn" onclick="tg.openLink('https://t.me/PalestinePLT')">انضمام</button>
        </div>
    </section>

    <section id="wallet-sec" class="content-section">
        <h3 style="text-align: right;">المحفظة والسحب</h3>
        <div class="balance-card">
            <div style="color: #888;">رصيدك القابل للسحب</div>
            <div class="bal-value" id="wallet-bal">0.00</div>
        </div>
        <div style="background:#111; padding:15px; border-radius:10px; border:1px solid #222; text-align:center;">
            <p style="font-size:12px; color:#666;">سيتم تحويل الأرباح إلى USDT عند الوصول لـ 5000 PLT</p>
            <button class="claim-btn" style="width:100%" onclick="tg.showAlert('عفواً، رصيدك غير كافٍ للسحب حالياً')">سحب الأرباح</button>
        </div>
    </section>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="navigate('mine-sec', this)"><i class="fas fa-hammer"></i><span>تعدين</span></div>
        <div class="nav-item" onclick="navigate('tasks-sec', this)"><i class="fas fa-tasks"></i><span>المهام</span></div>
        <div class="nav-item" onclick="navigate('wallet-sec', this)"><i class="fas fa-wallet"></i><span>المحفظة</span></div>
    </nav>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();

    // ربط الإعلانات بالـ UnitID الخاص بكِ من الصورة
    const AdController = window.Adsgram.init({ blockId: "bot-28088" });

    let balance = parseFloat(localStorage.getItem('user_bal')) || 0;
    let mEnd = localStorage.getItem('m_end');

    function updateDisplay() {
        document.getElementById('main-bal').innerText = balance.toFixed(2);
        document.getElementById('wallet-bal').innerText = balance.toFixed(2);
        localStorage.setItem('user_bal', balance);
    }
    updateDisplay();

    function navigate(id, el) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    async function showAdsgram() {
        try {
            const result = await AdController.show();
            // إذا شاهد المستخدم الإعلان كاملاً
            balance += 0.50;
            updateDisplay();
            tg.showAlert("تمت إضافة المكافأة بنجاح! ستظهر الأرباح في حساب Adsgram الخاص بكِ.");
        } catch (err) {
            tg.showAlert("لا توجد إعلانات متوفرة حالياً، حاول مجدداً لاحقاً.");
        }
    }

    function startMining() {
        if (mEnd && Date.now() < mEnd) return;
        mEnd = Date.now() + (24 * 60 * 60 * 1000);
        localStorage.setItem('m_end', mEnd);
        runMining();
    }

    function runMining() {
        const btn = document.getElementById('m-btn');
        const timer = document.getElementById('timer');
        if (!mEnd || Date.now() >= mEnd) return;
        btn.classList.add('active');
        setInterval(() => {
            const diff = mEnd - Date.now();
            if (diff <= 0) { location.reload(); }
            const h = Math.floor(diff/3600000);
            const m = Math.floor((diff%3600000)/60000);
            const s = Math.floor((diff%60000)/1000);
            timer.innerText = `${h}:${m<10?'0'+m:m}:${s<10?'0'+s:s}`;
            balance += 0.00005;
            updateDisplay();
        }, 1000);
    }

    if (mEnd) runMining();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main: #00ff88; --dark-bg: #000000; --card-bg: #0d0d0d; }
        body { background: var(--dark-bg); color: white; font-family: 'Cairo', sans-serif; margin: 0; padding: 0; user-select: none; overflow: hidden; }
        
        /* الحاوية الأساسية */
        .app { height: 100vh; display: flex; flex-direction: column; position: relative; }
        .page { flex: 1; overflow-y: auto; padding: 20px; display: none; padding-bottom: 100px; }
        .active-page { display: block; }

        /* الرأس والرصيد (مثل ZYN PI) */
        .top-info { text-align: center; margin-top: 10px; }
        .bal-container { background: linear-gradient(180deg, #111, #000); border-radius: 20px; padding: 30px; border-bottom: 2px solid var(--main); margin: 20px 0; }
        .bal-num { font-size: 50px; font-weight: 900; color: var(--main); text-shadow: 0 0 15px rgba(0,255,136,0.3); }

        /* زر التعدين الكبير */
        .mine-btn { width: 220px; height: 220px; background: radial-gradient(circle, #1a1a1a, #000); border-radius: 50%; margin: 30px auto; border: 4px solid #1a1a1a; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .mine-btn.mining { border-color: var(--main); box-shadow: 0 0 30px rgba(0,255,136,0.2); }
        .mine-btn i { font-size: 60px; color: #222; margin-bottom: 10px; }
        .mining i { color: var(--main); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        /* قائمة المهام (تصميم احترافي) */
        .task-card { background: var(--card-bg); border-radius: 15px; padding: 18px; margin-bottom: 12px; display: flex; align-items: center; border: 1px solid #1a1a1a; }
        .task-icon { font-size: 24px; width: 45px; color: var(--main); }
        .task-details { flex: 1; text-align: right; }
        .task-title { font-weight: bold; font-size: 15px; display: block; }
        .task-payout { font-size: 12px; color: var(--main); font-weight: bold; }
        .action-btn { background: #1a1a1a; color: white; border: none; padding: 8px 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .action-btn.green { background: var(--main); color: black; }

        /* شريط التنقل السفلي */
        .nav { position: fixed; bottom: 0; width: 100%; background: #080808; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #1a1a1a; z-index: 100; }
        .nav-item { color: #444; text-align: center; flex: 1; font-size: 11px; }
        .nav-item.active { color: var(--main); }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

<div class="app">
    <div id="p-mine" class="page active-page">
        <div class="top-info"><b style="letter-spacing: 2px;">PALESTINE NETWORK</b></div>
        <div class="bal-container">
            <div class="bal-num" id="bal">0.00</div>
            <div style="font-size: 12px; color: #666; font-weight: bold;">AVAILABLE PLT</div>
        </div>
        <div class="mine-btn" id="m-btn" onclick="startMining()">
            <i class="fas fa-hammer"></i>
            <span id="m-status" style="font-size: 13px; font-weight: bold; color: #444;">ابدأ التعدين</span>
            <div id="timer" style="color: var(--main); font-family: monospace; font-size: 18px; margin-top: 5px;"></div>
        </div>
    </div>

    <div id="p-tasks" class="page">
        <h3 style="text-align: right; margin-bottom: 20px;">المهام اليومية</h3>
        <div class="task-card">
            <i class="fas fa-play-circle task-icon"></i>
            <div class="task-details"><span class="task-title">مشاهدة إعلان فيديو</span><span class="task-payout">+0.50 PLT</span></div>
            <button class="action-btn green" onclick="runAdsgram()">مشاهدة</button>
        </div>
        <div class="task-card">
            <i class="fab fa-telegram task-icon" style="color: #24A1DE;"></i>
            <div class="task-details"><span class="task-title">انضم لقناتنا</span><span class="task-payout">+2.00 PLT</span></div>
            <button class="action-btn" onclick="openLink('https://t.me/PalestinePLT', 2.0, this)">انضمام</button>
        </div>
    </div>

    <div id="p-wallet" class="page">
        <h3 style="text-align: right;">المحفظة</h3>
        <div class="bal-container">
            <div style="font-size: 12px; color: #888;">الرصيد القابل للسحب</div>
            <div class="bal-num" id="w-bal">0.00</div>
        </div>
        <div style="background: #0d0d0d; padding: 20px; border-radius: 15px; border: 1px dashed #333; text-align: center;">
            <div style="font-size: 12px; color: #555; margin-bottom: 10px;">سيتم تفعيل السحب عند وصولك لـ 5000 عملة</div>
            <button class="action-btn" style="width: 100%; height: 50px;" onclick="tg.showAlert('رصيدك غير كافٍ')">طلب سحب</button>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item active" onclick="go('p-mine', this)"><i class="fas fa-hammer"></i><span>تعدين</span></div>
        <div class="nav-item" onclick="go('p-tasks', this)"><i class="fas fa-list-check"></i><span>المهام</span></div>
        <div class="nav-item" onclick="go('p-wallet', this)"><i class="fas fa-wallet"></i><span>محفظة</span></div>
    </nav>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();

    // ربط Adsgram باستخدام رقمك bot-28088
    const AdController = window.Adsgram ? window.Adsgram.init({ blockId: "bot-28088" }) : null;

    let balance = parseFloat(localStorage.getItem('plt_balance')) || 0;
    let endTime = localStorage.getItem('plt_endtime');

    function syncBal() {
        document.getElementById('bal').innerText = balance.toFixed(2);
        document.getElementById('w-bal').innerText = balance.toFixed(2);
        localStorage.setItem('plt_balance', balance);
    }
    syncBal();

    function go(pageId, navEl) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(pageId).classList.add('active-page');
        navEl.classList.add('active');
    }

    async function runAdsgram() {
        if (!AdController) return tg.showAlert("الإعلانات قيد التحميل...");
        try {
            await AdController.show();
            balance += 0.50;
            syncBal();
            tg.showAlert("مبروك! استلمت 0.50 PLT");
        } catch(e) { tg.showAlert("لا توجد إعلانات حالياً"); }
    }

    function openLink(url, reward, btn) {
        tg.openLink(url);
        setTimeout(() => {
            balance += reward;
            syncBal();
            btn.innerText = "تم ✅";
            btn.disabled = true;
        }, 4000);
    }

    function startMining() {
        if (endTime && Date.now() < endTime) return;
        endTime = Date.now() + (24 * 60 * 60 * 1000);
        localStorage.setItem('plt_endtime', endTime);
        miningProcess();
    }

    function miningProcess() {
        const btn = document.getElementById('m-btn');
        const timer = document.getElementById('timer');
        const status = document.getElementById('m-status');
        
        if (!endTime || Date.now() >= endTime) return;

        btn.classList.add('mining');
        status.innerText = "FARMING...";

        const loop = setInterval(() => {
            const now = Date.now();
            const diff = endTime - now;
            if (diff <= 0) {
                clearInterval(loop);
                btn.classList.remove('mining');
                status.innerText = "START MINING";
                timer.innerText = "";
            } else {
                const h = Math.floor(diff/3600000);
                const m = Math.floor((diff%3600000)/60000);
                const s = Math.floor((diff%60000)/1000);
                timer.innerText = `${h}:${m<10?'0'+m:m}:${s<10?'0'+s:s}`;
                balance += 0.00003;
                syncBal();
            }
        }, 1000);
    }

    if (endTime) miningProcess();
</script>
</body>
</html>

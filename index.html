<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PLT Mining App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #00ff88;
            --bg-color: #050505;
            --card-bg: #121212;
            --text-main: #ffffff;
            --text-dim: #888888;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            user-select: none;
        }

        .app-container {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* رأس الصفحة - الرصيد */
        .balance-section {
            text-align: center;
            margin-top: 30px;
            margin-bottom: 40px;
            width: 100%;
        }

        .balance-label {
            color: var(--text-dim);
            font-size: 14px;
            letter-spacing: 1px;
        }

        .balance-amount {
            font-size: 54px;
            font-weight: bold;
            color: var(--primary-color);
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
            margin: 10px 0;
        }

        /* زر التعدين المركزي */
        .mining-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            border: 4px solid #222;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .mining-circle:active {
            transform: scale(0.95);
        }

        .mining-circle i {
            font-size: 80px;
            color: var(--primary-color);
        }

        /* قائمة المهام */
        .section-title {
            width: 100%;
            text-align: right;
            margin: 30px 0 15px;
            font-size: 18px;
            color: var(--text-dim);
        }

        .task-card {
            background: var(--card-bg);
            width: 100%;
            border-radius: 15px;
            padding: 15px;
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            border: 1px solid #222;
        }

        .task-icon {
            width: 45px;
            height: 45px;
            background: #1a1a1a;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-left: 15px;
        }

        .task-info {
            flex-grow: 1;
            text-align: right;
        }

        .task-name { font-weight: bold; font-size: 14px; }
        .task-reward { color: var(--primary-color); font-size: 12px; }

        .btn-claim {
            background: var(--primary-color);
            color: black;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        /* الشريط السفلي */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #0f0f0f;
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 1px solid #222;
        }

        .nav-item {
            color: var(--text-dim);
            text-align: center;
            font-size: 10px;
            text-decoration: none;
        }

        .nav-item.active { color: var(--primary-color); }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 5px; }

        /* تأثيرات النقر */
        .tap-effect {
            position: absolute;
            color: var(--primary-color);
            font-weight: bold;
            pointer-events: none;
            animation: moveUp 0.8s ease-out forwards;
        }

        @keyframes moveUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="balance-section">
        <div class="balance-label">رصيدك الحالي</div>
        <div class="balance-amount" id="balance">0.00</div>
        <div style="font-size: 12px; color: #888;">PLT COIN</div>
    </div>

    <div class="mining-circle" id="tap-zone">
        <i class="fas fa-hammer"></i>
    </div>

    <div class="section-title">مهام سريعة</div>

    <div class="task-card">
        <div class="task-icon"><i class="fab fa-telegram" style="color: #24A1DE;"></i></div>
        <div class="task-info">
            <div class="task-name">انضم لقناة البوت</div>
            <div class="task-reward">+100 PLT</div>
        </div>
        <button class="btn-claim" onclick="doTask(this, 100)">تنفيذ</button>
    </div>

    <div class="task-card">
        <div class="task-icon"><i class="fas fa-users" style="color: #f39c12;"></i></div>
        <div class="task-info">
            <div class="task-name">دعوة صديق</div>
            <div class="task-reward">+500 PLT</div>
        </div>
        <button class="btn-claim" onclick="tg.showAlert('ميزة الإحالة قادمة!')">دعوة</button>
    </div>

    <div style="height: 100px;"></div>
</div>

<nav class="bottom-nav">
    <a href="#" class="nav-item active"><i class="fas fa-hammer"></i>تعدين</a>
    <a href="#" class="nav-item" onclick="tg.showAlert('المهام قريباً')"><i class="fas fa-list-check"></i>مهام</a>
    <a href="#" class="nav-item" onclick="tg.showAlert('المتجر قريباً')"><i class="fas fa-store"></i>المتجر</a>
    <a href="#" class="nav-item" onclick="tg.showAlert('المحفظة قريباً')"><i class="fas fa-wallet"></i>محفظة</a>
</nav>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    let score = parseFloat(localStorage.getItem('plt_score')) || 0;
    const balanceEl = document.getElementById('balance');
    const tapZone = document.getElementById('tap-zone');

    balanceEl.innerText = score.toFixed(2);

    // نظام النقر (التعدين)
    tapZone.addEventListener('click', (e) => {
        score += 0.05;
        updateUI();
        createTapEffect(e.clientX, e.clientY);
        tg.HapticFeedback.impactOccurred('medium');
    });

    function updateUI() {
        balanceEl.innerText = score.toFixed(2);
        localStorage.setItem('plt_score', score);
    }

    function createTapEffect(x, y) {
        const effect = document.createElement('div');
        effect.className = 'tap-effect';
        effect.innerText = '+0.05';
        effect.style.left = x + 'px';
        effect.style.top = y + 'px';
        document.body.appendChild(effect);
        setTimeout(() => effect.remove(), 800);
    }

    function doTask(btn, reward) {
        tg.showConfirm("هل قمت بالانضمام فعلاً؟", (ok) => {
            if(ok) {
                score += reward;
                updateUI();
                btn.innerText = "تم ✅";
                btn.disabled = true;
                btn.style.background = "#222";
                btn.style.color = "#555";
            }
        });
    }
</script>

</body>
</html>
